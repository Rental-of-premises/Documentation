openapi: 3.0.3
info:
  title: Rental of Premises API
  description: API для аренды помещений
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server

paths:
  # ========== ПУБЛИЧНЫЕ МАРШРУТЫ ==========
  /users/{id}:
    get:
      summary: Получить пользователя по ID
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Неверный ID
        '404':
          description: Пользователь не найден

  /auth/sign-up:
    post:
      summary: Регистрация пользователя
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: password123
                name:
                  type: string
                  example: John Doe
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  email:
                    type: string
                  name:
                    type: string
        '400':
          description: Неверный JSON
        '409':
          description: Пользователь уже существует

  /auth/sign-in:
    post:
      summary: Вход пользователя
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      email:
                        type: string
                      name:
                        type: string
        '401':
          description: Неверный email или пароль

  /apartments/{id}:
    get:
      summary: Получить апартамент по ID
      tags:
        - Apartments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Apartment'
        '404':
          description: Апартамент не найден

  /apartments:
    post:
      summary: Получить список апартаментов с фильтрацией
      tags:
        - Apartments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApartmentFilter'
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Apartment'
        '400':
          description: Неверный фильтр

  /bookings/{id}:
    get:
      summary: Получить бронирование по ID
      tags:
        - Bookings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          description: Бронирование не найдено

  # ========== ЗАЩИЩЕННЫЕ МАРШРУТЫ (требуют JWT) ==========
  /api/account/my-apartments:
    get:
      summary: Получить мои апартаменты (список продавца)
      tags:
        - My Apartments
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Apartment'
        '401':
          description: Неавторизован
        '404':
          description: Апартаменты не найдены

    post:
      summary: Создать новый апартамент
      tags:
        - My Apartments
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: Уютная студия
                description:
                  type: string
                  example: Светлая студия с панорамными окнами
                capacity:
                  type: integer
                  minimum: 1
                  example: 4
                price_per_hour:
                  type: integer
                  minimum: 0
                  example: 1500
                is_active:
                  type: boolean
                  default: true
      responses:
        '201':
          description: Апартамент создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
        '400':
          description: Неверный JSON или ошибка валидации
        '401':
          description: Неавторизован

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time

    Apartment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        seller_id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        capacity:
          type: integer
        price_per_hour:
          type: integer
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    ApartmentFilter:
      type: object
      properties:
        is_active:
          type: boolean
        seller_id:
          type: integer
          format: int64
        min_price:
          type: integer
          minimum: 0
        max_price:
          type: integer
          minimum: 0
        limit:
          type: integer
          default: 10
        offset:
          type: integer
          default: 0

    Booking:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        apartment_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [confirmed, cancelled, completed]
        time_from:
          type: string
          format: date-time
        time_to:
          type: string
          format: date-time

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security: []
