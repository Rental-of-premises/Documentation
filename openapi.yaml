openapi: 3.0.3
info:
  title: Rental of Premises API
  description: API для аренды помещений
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /auth/sign-up:
    post:
      summary: Регистрация нового пользователя
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: password123
                name:
                  type: string
                  example: John Doe
      responses:
        '201':
          description: Пользователь успешно создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  email:
                    type: string
                  name:
                    type: string
        '400':
          description: Неверный JSON или валидация не пройдена
        '409':
          description: Пользователь уже существует

  /auth/sign-in:
    post:
      summary: Вход пользователя
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT токен
                  user:
                    $ref: '#/components/schemas/UserResponse'
        '401':
          description: Неверный email или пароль

  /users/{id}:
    get:
      summary: Получить пользователя по ID
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Неверный ID
        '404':
          description: Пользователь не найден

  /apartments/{id}:
    get:
      summary: Получить апартамент по ID
      tags:
        - Apartments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Apartment'
        '404':
          description: Апартамент не найден

  /apartments:
    post:
      summary: Получить список апартаментов с фильтрацией
      tags:
        - Apartments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApartmentFilter'
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Apartment'
        '400':
          description: Неверный фильтр

  /booking/{id}:
    get:
      summary: Получить бронирование по ID
      tags:
        - Bookings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          description: Бронирование не найдено

components:
  schemas:
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time

    Apartment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        seller_id:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        capacity:
          type: integer
          minimum: 1
          nullable: true
        price_per_hour:
          type: integer
          minimum: 1
          nullable: true
        is_active:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time

    ApartmentFilter:
      type: object
      properties:
        is_active:
          type: boolean
        seller_id:
          type: integer
        min_price:
          type: integer
          minimum: 1
        max_price:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
          default: 10
        offset:
          type: integer
          minimum: 0
          default: 0

    Booking:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
          nullable: true
        apartment_id:
          type: integer
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [confirmed, cancelled, completed]
        time_from:
          type: string
          format: date-time
        time_to:
          type: string
          format: date-time

    BookingFilter:
      type: object
      properties:
        status:
          type: string
          enum: [confirmed, cancelled, completed]
        seller_id:
          type: integer
        min_price:
          type: integer
        max_price:
          type: integer
        limit:
          type: integer
          minimum: 1
          default: 10
        offset:
          type: integer
          minimum: 0
          default: 0

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []