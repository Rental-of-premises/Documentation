openapi: 3.0.3
info:
  title: Rental of Premises API
  description: |
    Backend API for managing rental premises. Currently in active development.
    Features:
    - User management (partial)
    - Apartment/Property management
    - Booking system
    - Payments processing
    - Reviews & ratings
    - Status tracking

    **Authentication:** JWT tokens (planned, currently endpoints may be open)
  version: 0.2.0
  contact:
    name: Alice & Albina
    url: https://github.com/Rental-of-premises/BackEnd
  license:
    name: Proprietary

servers:
  - url: http://localhost:3000/api
    description: Local development server (default)
  - url: https://api.rental-premises.example.com/v1
    description: Production server (placeholder)

tags:
  - name: Health
    description: Service health checks
  - name: Users
    description: User management (in progress)
  - name: Apartments
    description: Property and apartment management
  - name: Bookings
    description: Booking reservations
  - name: Payments
    description: Payment transactions
  - name: Reviews
    description: User reviews and ratings
  - name: Statuses
    description: Status tracking for bookings/properties
  - name: Auth
    description: Authentication and authorization (JWT - planned)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token authentication (to be implemented)

  schemas:
    # Core Entities
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: "user@example.com"
        full_name:
          type: string
          example: "John Doe"
        phone:
          type: string
          example: "+1234567890"
        role:
          type: string
          enum: [tenant, landlord, admin]
          default: tenant
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserCreate:
      type: object
      required: [email, full_name, password]
      properties:
        email:
          type: string
          format: email
        full_name:
          type: string
        password:
          type: string
          format: password
          minLength: 6
        phone:
          type: string
    UserUpdate:
      type: object
      properties:
        full_name:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email

    Apartment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        landlord_id:
          type: integer
          format: int64
        title:
          type: string
          example: "Cozy Downtown Apartment"
        description:
          type: string
        address:
          type: string
        city:
          type: string
        price_per_night:
          type: number
          format: float
        max_guests:
          type: integer
        bedrooms:
          type: integer
        beds:
          type: integer
        bathrooms:
          type: number
        amenities:
          type: array
          items:
            type: string
          example: ["wifi", "kitchen", "parking"]
        images:
          type: array
          items:
            type: string
            format: uri
        status:
          type: string
          enum: [active, inactive, maintenance]
          default: active
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ApartmentCreate:
      type: object
      required: [title, address, price_per_night]
      properties:
        landlord_id:
          type: integer
        title:
          type: string
        description:
          type: string
        address:
          type: string
        city:
          type: string
        price_per_night:
          type: number
        max_guests:
          type: integer
        bedrooms:
          type: integer
        beds:
          type: integer
        bathrooms:
          type: number
        amenities:
          type: array
          items:
            type: string

    Booking:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        apartment_id:
          type: integer
        check_in_date:
          type: string
          format: date
        check_out_date:
          type: string
          format: date
        total_price:
          type: number
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
        guests_count:
          type: integer
        special_requests:
          type: string
        created_at:
          type: string
          format: date-time
    BookingCreate:
      type: object
      required: [apartment_id, check_in_date, check_out_date, guests_count]
      properties:
        apartment_id:
          type: integer
        check_in_date:
          type: string
          format: date
        check_out_date:
          type: string
          format: date
        guests_count:
          type: integer
        special_requests:
          type: string

    Payment:
      type: object
      properties:
        id:
          type: integer
        booking_id:
          type: integer
        user_id:
          type: integer
        amount:
          type: number
        currency:
          type: string
          default: "USD"
        status:
          type: string
          enum: [pending, completed, failed, refunded]
        payment_method:
          type: string
          enum: [credit_card, paypal, bank_transfer]
        transaction_id:
          type: string
        created_at:
          type: string
          format: date-time

    Review:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        apartment_id:
          type: integer
        booking_id:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        created_at:
          type: string
          format: date-time

    Status:
      type: object
      properties:
        id:
          type: integer
        entity_type:
          type: string
          enum: [booking, apartment, payment]
        entity_id:
          type: integer
        status:
          type: string
        previous_status:
          type: string
        changed_by:
          type: integer
        notes:
          type: string
        created_at:
          type: string
          format: date-time

    # Common Responses
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        status_code:
          type: integer
    Success:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object

    # Authentication
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token
        user:
          $ref: '#/components/schemas/User'

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: The unique identifier
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
      description: Page number for pagination
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
      description: Items per page
    StatusParam:
      name: status
      in: query
      schema:
        type: string
      description: Filter by status

paths:
  # Health Check
  /health:
    get:
      tags: [Health]
      summary: Health check endpoint
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  timestamp:
                    type: string
                    format: date-time

  # Authentication (Planned)
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate user and get JWT token (planned)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
        '501':
          description: Not implemented yet (JWT in progress)
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user (planned)
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid input
        '409':
          description: Email already exists
        '501':
          description: Not fully implemented

  # Users
  /users:
    get:
      tags: [Users]
      summary: List all users (partial)
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  total:
                    type: integer
                  page:
                    type: integer
        '501':
          description: Endpoint partially implemented
    post:
      tags: [Users]
      summary: Create a new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid input
        '409':
          description: User already exists

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID (working)
      operationId: getUserById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
    put:
      tags: [Users]
      summary: Update user
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid input
        '404':
          description: User not found
    delete:
      tags: [Users]
      summary: Delete user
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: User deleted successfully
        '404':
          description: User not found

  # Apartments
  /apartments:
    get:
      tags: [Apartments]
      summary: List all apartments
      operationId: listApartments
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: city
          in: query
          schema:
            type: string
          description: Filter by city
        - name: min_price
          in: query
          schema:
            type: number
        - name: max_price
          in: query
          schema:
            type: number
        - name: bedrooms
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, maintenance]
      responses:
        '200':
          description: List of apartments
          content:
            application/json:
              schema:
                type: object
                properties:
                  apartments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Apartment'
                  total:
                    type: integer
    post:
      tags: [Apartments]
      summary: Create a new apartment
      operationId: createApartment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApartmentCreate'
      responses:
        '201':
          description: Apartment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Apartment'
        '400':
          description: Invalid input

  /apartments/{id}:
    get:
      tags: [Apartments]
      summary: Get apartment by ID
      operationId: getApartmentById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Apartment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Apartment'
        '404':
          description: Apartment not found
    put:
      tags: [Apartments]
      summary: Update apartment (UpdateApartment added Jun 11, 2026)
      operationId: updateApartment
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApartmentCreate'
      responses:
        '200':
          description: Apartment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Apartment'
        '400':
          description: Invalid input
        '404':
          description: Apartment not found
    delete:
      tags: [Apartments]
      summary: Delete apartment
      operationId: deleteApartment
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Apartment deleted
        '404':
          description: Apartment not found

  # Bookings
  /bookings:
    get:
      tags: [Bookings]
      summary: List bookings (with optional filters)
      operationId: listBookings
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: user_id
          in: query
          schema:
            type: integer
          description: Filter by user
        - name: apartment_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
                  total:
                    type: integer
    post:
      tags: [Bookings]
      summary: Create a new booking
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreate'
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Invalid input (e.g., dates overlap)

  /bookings/{id}:
    get:
      tags: [Bookings]
      summary: Get booking by ID
      operationId: getBookingById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Booking details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          description: Booking not found
    put:
      tags: [Bookings]
      summary: Update booking (e.g., change dates)
      operationId: updateBooking
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                check_in_date:
                  type: string
                  format: date
                check_out_date:
                  type: string
                  format: date
                guests_count:
                  type: integer
                special_requests:
                  type: string
      responses:
        '200':
          description: Booking updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Invalid input
        '404':
          description: Booking not found
    delete:
      tags: [Bookings]
      summary: Cancel booking
      operationId: cancelBooking
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Booking cancelled
        '404':
          description: Booking not found

  # Payments
  /payments:
    get:
      tags: [Payments]
      summary: List payments
      operationId: listPayments
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: booking_id
          in: query
          schema:
            type: integer
        - name: user_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of payments
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'
                  total:
                    type: integer
    post:
      tags: [Payments]
      summary: Process a payment for a booking
      operationId: createPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [booking_id, amount, payment_method]
              properties:
                booking_id:
                  type: integer
                amount:
                  type: number
                payment_method:
                  type: string
                  enum: [credit_card, paypal, bank_transfer]
                currency:
                  type: string
                  default: "USD"
      responses:
        '201':
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          description: Invalid payment details

  /payments/{id}:
    get:
      tags: [Payments]
      summary: Get payment by ID
      operationId: getPaymentById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '404':
          description: Payment not found

  # Reviews
  /reviews:
    get:
      tags: [Reviews]
      summary: List reviews
      operationId: listReviews
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: apartment_id
          in: query
          schema:
            type: integer
        - name: user_id
          in: query
          schema:
            type: integer
        - name: min_rating
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
      responses:
        '200':
          description: List of reviews
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
                  average_rating:
                    type: number
                    format: float
                  total:
                    type: integer
    post:
      tags: [Reviews]
      summary: Create a review for an apartment
      operationId: createReview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [apartment_id, booking_id, rating]
              properties:
                apartment_id:
                  type: integer
                booking_id:
                  type: integer
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          description: Invalid input (e.g., duplicate review)

  /reviews/{id}:
    get:
      tags: [Reviews]
      summary: Get review by ID
      operationId: getReviewById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Review details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '404':
          description: Review not found
    delete:
      tags: [Reviews]
      summary: Delete review
      operationId: deleteReview
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Review deleted
        '404':
          description: Review not found

  # Statuses (from commit "newap" and statuses branch)
  /statuses:
    get:
      tags: [Statuses]
      summary: Get status history for an entity
      operationId: listStatuses
      parameters:
        - name: entity_type
          in: query
          required: true
          schema:
            type: string
            enum: [booking, apartment, payment]
        - name: entity_id
          in: query
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Status history
          content:
            application/json:
              schema:
                type: object
                properties:
                  statuses:
                    type: array
                    items:
                      $ref: '#/components/schemas/Status'
                  total:
                    type: integer
    post:
      tags: [Statuses]
      summary: Update status of an entity
      operationId: updateStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entity_type, entity_id, status]
              properties:
                entity_type:
                  type: string
                  enum: [booking, apartment, payment]
                entity_id:
                  type: integer
                status:
                  type: string
                notes:
                  type: string
      responses:
        '201':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Invalid status transition
        '404':
          description: Entity not found

security:
  - BearerAuth: []   # Once JWT is implemented, uncomment this

# Global responses
responses:
  UnauthorizedError:
    description: Authentication information is missing or invalid
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          error: "Unauthorized"
          message: "Missing or invalid JWT token"
          status_code: 401
  ForbiddenError:
    description: User does not have permission
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
  NotFoundError:
    description: Resource not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
  ValidationError:
    description: Request validation failed
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
